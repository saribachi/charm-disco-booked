server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # TLS terminates at Traefik (port 80 here), so emit relative redirects
    # to keep the browser on HTTPS instead of forcing an http:// hop.
    absolute_redirect off;

    # Strip a trailing slash (so /thankyou-gtm/ resolves like /thankyou-gtm).
    # Root "/" is excluded because (.+) requires at least one character.
    location ~ ^/(.+)/$ { return 301 /$1; }

    # Thank-you pages: .html is permanently redirected to the clean URL (canonical)
    location = /thankyou-gtm.html { return 301 /thankyou-gtm; }
    location = /thankyou-cs.html  { return 301 /thankyou-cs; }

    # Clean URLs: /thankyou-gtm serves thankyou-gtm.html (and other .html still works)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
